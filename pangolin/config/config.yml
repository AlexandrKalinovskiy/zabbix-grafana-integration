gerbil:
  start_port: 51820
  base_endpoint: "192.168.40.60"

app:
  dashboard_url: "http://192.168.40.60"
  log_level: "info"
  save_logs: true
  telemetry:
    anonymous_usage: false

domains:
  domain1:
    base_domain: "192.168.40.60"
    cert_resolver: ""   # brak SSL dla testów lokalnych

server:
  secret: "lokalny-test-pangolin-secret-zmien-na-produkcji"
  cors:
    origins:
      - "http://192.168.40.60"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    allowed_headers: ["X-CSRF-Token", "Content-Type"]
    credentials: false

flags:
  require_email_verification: false
  disable_signup_without_invite: false
  disable_user_create_org: false
  allow_raw_resources: true

# ── PostgreSQL → YugabyteDB ──────────────────────────────────────
postgres:
  connection_string: "postgresql://yugabyte@172.20.0.10:5433/pangolin"  # port wewnętrzny zawsze 5433!
