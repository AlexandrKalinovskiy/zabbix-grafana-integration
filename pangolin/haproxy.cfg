global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull

    # ── Agresywne timeouty — szybkie wykrycie i odcięcie ─────────────
    timeout connect  2s      # maks. czas na nawiązanie połączenia z backendem
    timeout client   30s     # maks. czas bezczynności po stronie klienta
    timeout server   10s     # maks. czas oczekiwania na odpowiedź serwera

    # Natychmiastowy retry na innym serwerze po błędzie połączenia
    retries         2
    option          redispatch   # jeśli serwer padnie W TRAKCIE requestu →
                                 # zerwij TCP i prześlij go na inny backend

# ── Frontend — wejście użytkownika ─────────────────────────────────
frontend pangolin_http
    bind *:80
    option  forwardfor       # przekaż X-Forwarded-For
    default_backend pangolin_ui

# ── Backend — instancje Pangolin ───────────────────────────────────
backend pangolin_ui
    balance roundrobin

    # ── Health check: osobny sidecar sprawdza ZARÓWNO Pangolin JAK I YugabyteDB
    # check addr <hc-sidecar> port 9000 — HAProxy pyta sidecar, nie Pangolina
    # Sidecar zwraca 200=oba zdrowe, 503=cokolwiek padło
    option  httpchk GET /
    http-check expect status 200

    # ── Agresywny failover ─────────────────────────────────────────
    timeout connect 2s
    timeout server  5s

    # fall 1 = po 1 nieudanym checku (3s) → serwer DOWN (szybszy failover!)
    # rise 2 = po 2 udanych checkach    → serwer wraca do rotacji
    # inter 3s = co 3s sprawdzaj
    # fastinter 1s = gdy serwer już DOWN, sprawdzaj co 1s (szybszy powrót)
    # downinter 2s = gdy DOWN, retry co 2s

    # pangolin-1 — traffic → pangolin-1:3002, health → hc-node1:9000
    server pangolin-1 pangolin-1:3002 check addr hc-node1 port 9000 inter 3s fastinter 1s downinter 2s fall 1 rise 2

    # pangolin-2 — traffic → pangolin-2:3002, health → hc-node2:9000
    server pangolin-2 pangolin-2:3002 check addr hc-node2 port 9000 inter 3s fastinter 1s downinter 2s fall 1 rise 2

    # sorry-page — serwer zapasowy gdy OBA pangolinki są DOWN
    # backup = używany TYLKO gdy wszystkie normalne serwery DOWN
    server sorry-page sorry-page:80 backup

# ── Statystyki HAProxy ─────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 2s
    stats show-legends
    stats show-node
    stats admin if TRUE
