global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    retries 2
    option  redispatch

    timeout connect  2s
    timeout client   30s
    timeout server   10s

# ── Frontend ────────────────────────────────────────────────────────
frontend pangolin_http
    bind *:80

    # /api/v1/* → serwer API Pangolina (port 3000)
    # reszta    → Next.js UI Pangolina (port 3002)
    acl is_api path_beg /api/v1
    use_backend  pangolin_api if is_api
    default_backend pangolin_ui

# ── Backend: API (port 3000) ─────────────────────────────────────────
backend pangolin_api
    balance roundrobin
    option  httpchk GET /api/v1/
    http-check expect status 200
    cookie SERVERID insert indirect nocache maxlife 3600
    timeout connect 2s
    timeout server  10s

    server api-1 pangolin-1:3000 cookie p1 check addr hc-node1 port 9000 inter 3s fastinter 1s downinter 2s fall 1 rise 2
    server api-2 pangolin-2:3000 cookie p2 check addr hc-node2 port 9000 inter 3s fastinter 1s downinter 2s fall 1 rise 2
    server api-sorry sorry-page:80 backup

# ── Backend: UI / Next.js (port 3002) ───────────────────────────────
backend pangolin_ui
    balance roundrobin
    option  httpchk GET /
    http-check expect status 200
    cookie SERVERID insert indirect nocache maxlife 3600
    timeout connect 2s
    timeout server  10s

    # fall 1 = po 1 nieudanym checku (~3s) serwer DOWN
    # rise 2 = po 2 udanych checkach wraca do rotacji
    server ui-1 pangolin-1:3002 cookie p1 check addr hc-node1 port 9000 inter 3s fastinter 1s downinter 2s fall 1 rise 2
    server ui-2 pangolin-2:3002 cookie p2 check addr hc-node2 port 9000 inter 3s fastinter 1s downinter 2s fall 1 rise 2
    server ui-sorry sorry-page:80 backup

# ── Statystyki HAProxy ───────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 2s
    stats show-legends
    stats show-node
    stats admin if TRUE
