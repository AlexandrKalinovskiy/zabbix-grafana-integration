<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="10">
  <title>Chwilowa przerwa — Pangolin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e6edf3;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.97); }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #f0f6fc;
    }

    p {
      font-size: 0.95rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f78166;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .progress {
      width: 100%;
      height: 3px;
      background: #21262d;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #1f6feb, #388bfd);
      border-radius: 999px;
      animation: load 10s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🦔</div>
    <h1>Trwa przełączanie na zapasową instancję</h1>
    <p>
      Jeden z węzłów uległ awarii. System HA automatycznie przełącza ruch
      na zdrową instancję. Strona odświeży się za kilka sekund.
    </p>

    <div class="badge">
      <span class="dot"></span>
      Failover w toku — automatyczne odświeżenie za 10s
    </div>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <div class="footer">
      Pangolin HA · YugabyteDB RF=3 · HAProxy
    </div>
  </div>
</body>
</html>
