name: pangolin

services:
  pangolin:
    image: docker.io/fosrl/pangolin:postgresql-latest
    container_name: pangolin
    restart: unless-stopped
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "10s"
      timeout: "10s"
      retries: 15
    networks:
      - pangolin-net
      - yugabyte-net   # dostęp do YugabyteDB

  gerbil:
    image: docker.io/fosrl/gerbil:latest
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ./config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
      - "21820:21820/udp"
      - "80:80"
      - "443:443"
    networks:
      - pangolin-net

  traefik:
    image: docker.io/traefik:v3.6
    container_name: traefik-pangolin
    restart: unless-stopped
    network_mode: service:gerbil   # Porty przez gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ./config/traefik:/etc/traefik:ro
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik

networks:
  pangolin-net:
    driver: bridge
    name: pangolin-net
  yugabyte-net:
    external: true
    name: yugabytedb_yugabyte-net   # rzeczywista nazwa sieci Docker
