version: '3.8'

networks:
  zabbix-net:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  zabbix-snmptraps:

services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zabbix-postgres
    restart: unless-stopped
    networks:
      - zabbix-net
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix -d zabbix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zabbix Server ─────────────────────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:7.0-alpine-latest
    container_name: zabbix-server
    restart: unless-stopped
    networks:
      - zabbix-net
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pass
      ZBX_ENABLE_SNMP_TRAPS: "true"
    volumes:
      - zabbix-snmptraps:/var/lib/zabbix/snmptraps
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Zabbix Web (Nginx) ────────────────────────────────────────
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:7.0-alpine-latest
    container_name: zabbix-web
    restart: unless-stopped
    networks:
      - zabbix-net
    ports:
      - "8080:8080"
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: postgres
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pass
      PHP_TZ: Europe/Warsaw
    depends_on:
      - zabbix-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Zabbix Agent 2 ────────────────────────────────────────────
  zabbix-agent:
    image: zabbix/zabbix-agent2:7.0-alpine-latest
    container_name: zabbix-agent
    restart: unless-stopped
    networks:
      - zabbix-net
    environment:
      ZBX_HOSTNAME: "Zabbix server"
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: "10051"
    depends_on:
      - zabbix-server

  # ─── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - zabbix-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "Op2oyxq##"
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: alexanderzobnin-zabbix-app
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - zabbix-web

  # ─── Port Monitor ──────────────────────────────────────────────
  port-monitor:
    build: ./port-monitor
    container_name: port-monitor
    restart: unless-stopped
    networks:
      - zabbix-net
    ports:
      - "8090:8090"
    environment:
      ZABBIX_URL: http://zabbix-web:8080/api_jsonrpc.php
      ZABBIX_USER: Admin
      ZABBIX_PASS: "Op2oyxq##"
    depends_on:
      zabbix-web:
        condition: service_healthy
